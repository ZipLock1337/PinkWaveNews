<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="contacts.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />

    <title>Контакти | PinkWave Новини</title>
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="logo">
          <img src="82445989-930d-425c-b607-39a3894f5215.png" alt="Logo" />
        </div>

        <nav class="navbar">
          <ul class="header_list">
            <li><a href="index.html" class="list_link">Головна</a></li>
            <li><a href="about.html" class="list_link">Про нас</a></li>
            <li>
              <a href="resources.html" class="list_link">Ресурси</a>
            </li>
          </ul>
        </nav>

        <a href="authorization.html" class="btn">Вхід</a>
      </div>
    </header>

    <!-- HERO -->
    <main class="contacts-hero">
      <div class="container">
        <h1>Контакти</h1>
        <p>Зв’яжіться з нами будь-коли — ми відповідаємо швидко</p>
      </div>
    </main>

    <!-- CONTACT SECTION -->
    <section class="contacts-section">
      <div class="container contacts-grid">
        <!-- INFO -->
        <div class="contacts-info">
          <h2>Інформація</h2>

          <div class="info-block">
            <h4>Email</h4>
            <p>news@pinkwave.edu</p>
          </div>

          <div class="info-block">
            <h4>Телефон</h4>
            <p>1800 123 456</p>
          </div>

          <div class="info-block">
            <h4>Адреса</h4>
            <p>Сідней, NSW 2000</p>
          </div>

          <div class="info-block">
            <h4>Час роботи</h4>
            <p>Пн - Пт: 09:00 - 18:00</p>
          </div>
        </div>

        <!-- FORM -->
        <div class="contacts-form">
          <h2>Написати нам</h2>

          <form>
            <input type="text" placeholder="Ваше ім'я" required />
            <input type="email" placeholder="Email" required />
            <textarea placeholder="Повідомлення" rows="6" required></textarea>

            <button type="submit" class="btn">Надіслати</button>
          </form>
        </div>
      </div>
    </section>

    <!-- Support Chat Widget -->
    <div class="ai-chat" id="aiChat">
      <div class="ai-header">
        <span>Підтримка</span>
        <button id="aiToggle">×</button>
      </div>

      <div class="ai-body">
        <!-- FAQ -->
        <div class="ai-faq" id="aiFaq"></div>

        <!-- Messages -->
        <div class="ai-messages" id="aiMessages"></div>
      </div>

      <div class="ai-input">
        <input id="aiInput" placeholder="Напишіть питання..." />
        <button id="aiSend">➤</button>
      </div>
    </div>

    <!-- Floating button -->
    <button class="ai-fab" id="aiFab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path
          d="M12 3C6.5 3 2 6.6 2 11c0 2.7 1.7 5.2 4.5 6.7L6 21l3.8-2.1c.7.1 1.4.2 2.2.2 5.5 0 10-3.6 10-8s-4.5-8-10-8z"
          fill="white"
        />
      </svg>
    </button>

    <!-- Script -->
    <script type="module" src="chat.js"></script>
  </body>
</html>
