<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Editor Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="authorization.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  </head>

  <body>
    <div class="auth-container">
      <h1 class="auth-title">PinkWave</h1>
      <p class="auth-subtitle">Авторизація користувачів та редакторів</p>

      <!-- MODE SWITCH -->
      <div class="mode-switch">
        <button type="button" id="loginMode" class="active">Вхід</button>
        <button type="button" id="registerMode">Реєстрація</button>
      </div>

      <form id="authForm">
        <div class="form-group" id="nicknameGroup" style="display: none">
          <label for="nickname">Нік</label>

          <input type="text" id="nickname" placeholder="Ваш нік" />
        </div>

        <div class="form-group">
          <label for="email">Електронна пошта</label>

          <input
            type="email"
            id="email"
            placeholder="example@email.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>

          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="main-btn" id="submitBtn">Увійти</button>
      </form>

      <p id="errorMessage"></p>

      <div class="footer-text">PinkWave News</div>
    </div>

    <script type="module" src="authorization.js"></script>
  </body>
</html>
